upstream backend {
    server backend:4000;
}

upstream frontend {
    server frontend:3000;
}

# ── Rate limiting zones ────────────────────────────────────────────────────────
limit_req_zone $binary_remote_addr zone=api:10m rate=30r/s;
limit_req_zone $binary_remote_addr zone=auth:10m rate=5r/m;

# ── Gzip compression ──────────────────────────────────────────────────────────
gzip on;
gzip_vary on;
gzip_proxied any;
gzip_comp_level 6;
gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

server {
    listen 80;
    server_name _;

    # ── Security headers ───────────────────────────────────────────────────────
    server_tokens off;
    client_max_body_size 10m;

    # ── Protocol detection ─────────────────────────────────────────────────────
    # Preserve X-Forwarded-Proto set by an upstream proxy (e.g. ngrok sends
    # "https" even though nginx only sees the plain HTTP leg).
    # Falls back to $scheme (http) when accessed directly without a proxy.
    set $real_proto $scheme;
    if ($http_x_forwarded_proto != '') {
        set $real_proto $http_x_forwarded_proto;
    }

    # Increase buffer sizes for API responses
    proxy_buffer_size          128k;
    proxy_buffers              4 256k;
    proxy_busy_buffers_size    256k;

    # ── Socket.IO ─────────────────────────────────────────────────────────────
    # Must come before the generic /api block
    location /socket.io/ {
        proxy_pass http://backend;
        proxy_http_version 1.1;

        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host       $host;
        proxy_set_header X-Real-IP  $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $real_proto;
        proxy_set_header X-Forwarded-Host  $host;

        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    # ── Backend REST API ───────────────────────────────────────────────────────
    location /api/auth/ {
        limit_req zone=auth burst=10 nodelay;
        limit_req_status 429;

        proxy_pass http://backend;
        proxy_http_version 1.1;

        proxy_set_header Host       $host;
        proxy_set_header X-Real-IP  $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $real_proto;
        proxy_set_header X-Forwarded-Host  $host;
        proxy_set_header Cookie $http_cookie;
    }

    location /api/ {
        limit_req zone=api burst=50 nodelay;
        limit_req_status 429;

        proxy_pass http://backend;
        proxy_http_version 1.1;

        proxy_set_header Host       $host;
        proxy_set_header X-Real-IP  $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $real_proto;
        proxy_set_header X-Forwarded-Host  $host;
        # Forward cookies for session authentication
        proxy_set_header Cookie $http_cookie;
    }

    # ── Next.js Frontend ───────────────────────────────────────────────────────
    location / {
        proxy_pass http://frontend;
        proxy_http_version 1.1;

        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host       $host;
        proxy_set_header X-Real-IP  $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $real_proto;
        proxy_set_header X-Forwarded-Host  $host;
    }
}
