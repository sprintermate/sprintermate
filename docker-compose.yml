services:

  # ── Backend (Express + Socket.IO) ──────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      PORT: "4000"
      NODE_ENV: production
      SESSION_SECRET: ${SESSION_SECRET:-change-me-in-production}
      # Tells CORS to allow the nginx / ngrok origin
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost}
    volumes:
      # Persist the SQLite database
      - backend_data:/app/data
    restart: unless-stopped
    networks:
      - internal

  # ── Frontend (Next.js) ─────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        # Empty → browser uses same origin so nginx routes /api & /socket.io
        NEXT_PUBLIC_BACKEND_URL: ""
    environment:
      NODE_ENV: production
      # Server-side (SSR) calls go directly to backend over the internal network
      BACKEND_URL: http://backend:4000
    restart: unless-stopped
    networks:
      - internal

  # ── Nginx reverse-proxy ────────────────────────────────────────────────────
  nginx:
    image: nginx:1.27-alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
      - frontend
    restart: unless-stopped
    networks:
      - internal

  # ── ngrok tunnel ───────────────────────────────────────────────────────────
  # Exposes nginx :80 to the public internet.
  # Set NGROK_AUTHTOKEN in your .env file (https://dashboard.ngrok.com/get-started/your-authtoken).
  ngrok:
    image: ngrok/ngrok:latest
    command: http nginx:80 --log=stdout
    environment:
      NGROK_AUTHTOKEN: ${NGROK_AUTHTOKEN}
    ports:
      # ngrok web inspector UI
      - "4040:4040"
    depends_on:
      - nginx
    restart: unless-stopped
    networks:
      - internal

networks:
  internal:
    driver: bridge

volumes:
  backend_data:
